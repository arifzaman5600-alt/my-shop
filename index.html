<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Shop</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      margin: 0;
    }
    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px;
    }
    .product {
      background: white;
      padding: 15px;
      margin: 10px;
      width: 200px;
      border-radius: 10px;
      text-align: center;
    }
    button {
      background: green;
      color: white;
      border: none;
      padding: 8px;
      cursor: pointer;
    }
    #cart {
      position: fixed;
      right: 10px;
      top: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>My eCommerce Shop</h1>
</header>

<div id="cart">
  🛒 Cart: <span id="cart-count">0</span>
</div>

<div class="products" id="product-list"></div>

<script>
  const products = [
    {id:1, name:"T-Shirt", price:500},
    {id:2, name:"Shoes", price:1200},
    {id:3, name:"Watch", price:800}
  ];

  let cart = [];

  const productList = document.getElementById("product-list");
  const cartCount = document.getElementById("cart-count");

  function displayProducts() {
    products.forEach(p => {
      const div = document.createElement("div");
      div.className = "product";
      div.innerHTML = `
        <h3>${p.name}</h3>
        <p>৳${p.price}</p>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
      `;
      productList.appendChild(div);
    });
  }

  function addToCart(id) {
    cart.push(id);
    cartCount.innerText = cart.length;
  }

  displayProducts();
</script>

</body>
</html>
